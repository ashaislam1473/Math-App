<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Math Solver AI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;display:flex;justify-content:center;padding:30px 16px;transition:all 0.3s}
body.light{background:linear-gradient(135deg,#667eea,#764ba2)}
.app{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border-radius:24px;padding:28px 24px;width:100%;max-width:640px;border:1px solid rgba(255,255,255,0.1);height:fit-content}
body.light .app{background:rgba(255,255,255,0.95);border:1px solid rgba(0,0,0,0.1)}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.header h1{font-size:22px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
body.light .header h1{color:#1a1a2e}
#theme-btn{padding:8px 14px;border:1px solid rgba(255,255,255,0.3);border-radius:20px;background:rgba(255,255,255,0.1);color:#fff;font-size:12px;font-family:'Poppins',sans-serif;cursor:pointer;font-weight:600}
body.light #theme-btn{border-color:#ddd;background:white;color:#333}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 16px;border:1px solid rgba(255,255,255,0.2);border-radius:20px;background:transparent;color:rgba(255,255,255,0.6);font-size:12px;font-family:'Poppins',sans-serif;cursor:pointer;font-weight:600;transition:all 0.3s}
.tab.active{background:linear-gradient(135deg,#e94560,#c0392b);border-color:transparent;color:white}
body.light .tab{border-color:#ddd;color:#888}
body.light .tab.active{background:linear-gradient(135deg,#667eea,#764ba2);color:white}
.input-section{margin-bottom:20px}
.input-label{font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:8px;display:block;font-weight:500}
body.light .input-label{color:#666}
.input-box{width:100%;padding:16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:14px;color:#fff;font-size:15px;font-family:'Poppins',sans-serif;outline:none;transition:all 0.3s;resize:none}
.input-box:focus{border-color:#e94560;background:rgba(255,255,255,0.12)}
body.light .input-box{background:#f8f9ff;border-color:#ddd;color:#333}
body.light .input-box:focus{border-color:#667eea;background:white}
.lang-toggle{display:flex;gap:8px;margin-bottom:12px}
.lang-btn{padding:6px 14px;border:1px solid rgba(255,255,255,0.2);border-radius:20px;background:transparent;color:rgba(255,255,255,0.6);font-size:12px;font-family:'Poppins',sans-serif;cursor:pointer;font-weight:600;transition:all 0.3s}
.lang-btn.active{background:rgba(78,204,163,0.3);border-color:#4ecca3;color:#4ecca3}
body.light .lang-btn{border-color:#ddd;color:#888}
body.light .lang-btn.active{background:rgba(102,126,234,0.1);border-color:#667eea;color:#667eea}
.examples{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.example-btn{padding:5px 12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:rgba(255,255,255,0.7);font-size:11px;font-family:'Poppins',sans-serif;cursor:pointer;transition:all 0.2s}
.example-btn:hover{background:rgba(255,255,255,0.15)}
body.light .example-btn{background:#f0f0f0;border-color:#ddd;color:#555}
.solve-btn{width:100%;padding:14px;background:linear-gradient(135deg,#e94560,#c0392b);color:white;border:none;border-radius:14px;font-size:15px;font-family:'Poppins',sans-serif;font-weight:700;cursor:pointer;transition:all 0.3s;margin-bottom:20px}
body.light .solve-btn{background:linear-gradient(135deg,#667eea,#764ba2)}
.solve-btn:disabled{opacity:0.6;cursor:not-allowed}
.result-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:20px;margin-bottom:20px;display:none}
body.light .result-box{background:#f8f9ff;border-color:#e0e0e0}
.result-box.show{display:block}
.result-header{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:12px;font-weight:500;text-transform:uppercase;letter-spacing:1px}
body.light .result-header{color:#999}
.answer{font-size:26px;font-weight:700;color:#4ecca3;margin-bottom:16px}
body.light .answer{color:#667eea}
.ai-explanation{background:rgba(78,204,163,0.08);border:1px solid rgba(78,204,163,0.2);border-radius:12px;padding:16px;margin-top:12px}
body.light .ai-explanation{background:rgba(102,126,234,0.05);border-color:rgba(102,126,234,0.2)}
.ai-label{font-size:11px;color:#4ecca3;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
body.light .ai-label{color:#667eea}
.ai-text{font-size:13px;color:rgba(255,255,255,0.85);line-height:1.8;white-space:pre-wrap}
body.light .ai-text{color:#444}
.steps{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.step{display:flex;gap:12px;align-items:flex-start}
.step-num{width:24px;height:24px;background:linear-gradient(135deg,#e94560,#c0392b);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;margin-top:2px}
body.light .step-num{background:linear-gradient(135deg,#667eea,#764ba2)}
.step-text{font-size:13px;color:rgba(255,255,255,0.8);line-height:1.6}
body.light .step-text{color:#444}
.error-box{background:rgba(233,69,96,0.15);border:1px solid rgba(233,69,96,0.3);border-radius:14px;padding:16px;margin-bottom:20px;display:none;color:#ff6b6b;font-size:13px;line-height:1.6}
.error-box.show{display:block}
.loading{display:none;text-align:center;padding:20px;color:rgba(255,255,255,0.6);font-size:13px}
.loading.show{display:block}
.spinner{width:30px;height:30px;border:3px solid rgba(255,255,255,0.1);border-top:3px solid #e94560;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
body.light .spinner{border-top-color:#667eea}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:linear-gradient(135deg,rgba(78,204,163,0.2),rgba(102,126,234,0.2));border:1px solid rgba(78,204,163,0.3);border-radius:10px;font-size:11px;color:#4ecca3;font-weight:600;margin-bottom:12px}
body.light .ai-badge{color:#667eea;border-color:rgba(102,126,234,0.3)}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.calc-btn{padding:16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:12px;color:#fff;font-size:16px;font-family:'Poppins',sans-serif;cursor:pointer;transition:all 0.2s;font-weight:500}
.calc-btn:hover{background:rgba(255,255,255,0.15);transform:scale(1.05)}
.calc-btn.operator{background:rgba(233,69,96,0.2);border-color:rgba(233,69,96,0.3);color:#e94560}
.calc-btn.equals{background:linear-gradient(135deg,#e94560,#c0392b);border-color:transparent;color:white;grid-column:span 2}
.calc-btn.clear{background:rgba(255,165,0,0.2);border-color:rgba(255,165,0,0.3);color:orange}
body.light .calc-btn{background:#f5f5f5;border-color:#e0e0e0;color:#333}
body.light .calc-btn.operator{background:#ffe8f0;color:#e94560}
body.light .calc-btn.equals{background:linear-gradient(135deg,#667eea,#764ba2);color:white}
body.light .calc-btn.clear{background:#fff3e0;color:orange}
.calc-display{width:100%;padding:16px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:14px;color:#fff;font-size:20px;font-family:'Poppins',sans-serif;outline:none;margin-bottom:12px;text-align:right}
body.light .calc-display{background:#f8f9ff;border-color:#ddd;color:#333}
.history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.history-title{font-size:13px;color:rgba(255,255,255,0.6);font-weight:600;text-transform:uppercase;letter-spacing:1px}
body.light .history-title{color:#888}
.clear-btn{padding:4px 12px;background:rgba(233,69,96,0.2);border:1px solid rgba(233,69,96,0.3);border-radius:10px;color:#e94560;font-size:11px;font-family:'Poppins',sans-serif;cursor:pointer}
.history-list{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto}
.history-item{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 14px;cursor:pointer;transition:all 0.2s}
.history-item:hover{background:rgba(255,255,255,0.1)}
body.light .history-item{background:#f5f5f5;border-color:#e0e0e0}
.history-problem{font-size:13px;color:rgba(255,255,255,0.8);font-weight:500}
body.light .history-problem{color:#333}
.history-answer{font-size:12px;color:#4ecca3;font-weight:600;margin-top:2px}
body.light .history-answer{color:#667eea}
.empty-history{text-align:center;color:rgba(255,255,255,0.3);font-size:13px;padding:20px 0}
body.light .empty-history{color:#bbb}
.graph-input-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.graph-input{flex:1;min-width:160px;padding:12px 16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:#fff;font-size:14px;font-family:'Poppins',sans-serif;outline:none}
body.light .graph-input{background:#f8f9ff;border-color:#ddd;color:#333}
.graph-btn{padding:12px 20px;background:linear-gradient(135deg,#e94560,#c0392b);color:white;border:none;border-radius:12px;font-size:14px;font-family:'Poppins',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap}
body.light .graph-btn{background:linear-gradient(135deg,#667eea,#764ba2)}
.graph-container{background:rgba(0,0,0,0.3);border-radius:14px;padding:16px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.1)}
body.light .graph-container{background:#f8f9ff;border-color:#e0e0e0}
canvas{width:100%;border-radius:10px;display:block}
.graph-examples{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.graph-info{font-size:11px;color:rgba(255,255,255,0.5);text-align:center;margin-top:8px}
body.light .graph-info{color:#999}
.range-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.range-label{font-size:12px;color:rgba(255,255,255,0.6);white-space:nowrap}
body.light .range-label{color:#666}
.range-input{width:70px;padding:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:#fff;font-size:13px;font-family:'Poppins',sans-serif;outline:none;text-align:center}
body.light .range-input{background:#f8f9ff;border-color:#ddd;color:#333}
.api-key-section{background:rgba(255,165,0,0.1);border:1px solid rgba(255,165,0,0.3);border-radius:12px;padding:14px;margin-bottom:16px}
.api-key-label{font-size:11px;color:orange;font-weight:600;margin-bottom:6px;display:block}
.api-key-input{width:100%;padding:10px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,165,0,0.3);border-radius:8px;color:#fff;font-size:13px;font-family:'Poppins',sans-serif;outline:none}
body.light .api-key-input{background:#fff;border-color:#ffa500;color:#333}
.api-key-note{font-size:10px;color:rgba(255,165,0,0.7);margin-top:6px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🤖 Math AI Solver</h1>
    <button id="theme-btn" onclick="toggleTheme()">☀️ Light</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('solver',this)">🧮 AI Solver</button>
    <button class="tab" onclick="switchTab('calculator',this)">🔢 Calculator</button>
    <button class="tab" onclick="switchTab('graph',this)">📊 Graph</button>
    <button class="tab" onclick="switchTab('history',this)">📜 History</button>
  </div>

  <!-- AI SOLVER TAB -->
  <div id="tab-solver">

    <!-- API KEY INPUT -->
    <div class="api-key-section">
      <span class="api-key-label">🔑 Gemini API Key (একবার দাও, save হয়ে থাকবে)</span>
      <input class="api-key-input" id="api-key-input" type="password" placeholder="AIzaSy... paste করো"/>
      <div class="api-key-note">⚠️ Key শুধু তোমার browser এ save হবে — কোথাও upload হবে না</div>
    </div>

    <!-- LANGUAGE TOGGLE -->
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('en',this)">🇬🇧 English</button>
      <button class="lang-btn" onclick="setLang('bn',this)">🇧🇩 বাংলা</button>
    </div>

    <div class="input-section">
      <span class="input-label">তোমার math problem লেখো:</span>
      <textarea class="input-box" id="problem-input" rows="3" placeholder="যেকোনো math problem লেখো...&#10;&#10;যেমন: 2 + 2, x + 5 = 10, sqrt(144)&#10;অথবা: If a train travels 60km/h for 2 hours..."></textarea>
      <div class="examples">
        <button class="example-btn" onclick="setExample('2 + 2')">2 + 2</button>
        <button class="example-btn" onclick="setExample('15% of 200')">15% of 200</button>
        <button class="example-btn" onclick="setExample('sqrt(144)')">√144</button>
        <button class="example-btn" onclick="setExample('x + 5 = 10')">x + 5 = 10</button>
        <button class="example-btn" onclick="setExample('2^10')">2¹⁰</button>
        <button class="example-btn" onclick="setExample('sin(30 deg)')">sin(30°)</button>
        <button class="example-btn" onclick="setExample('If a train goes 60km/h for 2 hours, how far?')">🚂 Word problem</button>
        <button class="example-btn" onclick="setExample('What is the area of a circle with radius 5?')">⭕ Circle area</button>
      </div>
    </div>

    <button class="solve-btn" id="solve-btn" onclick="solveProblem()">🤖 AI দিয়ে Solve করো</button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      AI চিন্তা করছে...
    </div>

    <div class="error-box" id="error-box"></div>

    <div class="result-box" id="result-box">
      <div class="ai-badge">🤖 Powered by Google Gemini AI</div>
      <div class="result-header">✅ Solution</div>
      <div class="answer" id="answer-display"></div>
      <div class="ai-explanation">
        <div class="ai-label">🧠 AI Explanation</div>
        <div class="ai-text" id="ai-explanation"></div>
      </div>
    </div>
  </div>

  <!-- CALCULATOR TAB -->
  <div id="tab-calculator" style="display:none">
    <input class="calc-display" id="calc-display" readonly placeholder="0"/>
    <div class="calc-grid">
      <button class="calc-btn clear" onclick="calcClear()">C</button>
      <button class="calc-btn clear" onclick="calcDel()">⌫</button>
      <button class="calc-btn operator" onclick="calcInput('%')">%</button>
      <button class="calc-btn operator" onclick="calcInput('/')">÷</button>
      <button class="calc-btn" onclick="calcInput('7')">7</button>
      <button class="calc-btn" onclick="calcInput('8')">8</button>
      <button class="calc-btn" onclick="calcInput('9')">9</button>
      <button class="calc-btn operator" onclick="calcInput('*')">×</button>
      <button class="calc-btn" onclick="calcInput('4')">4</button>
      <button class="calc-btn" onclick="calcInput('5')">5</button>
      <button class="calc-btn" onclick="calcInput('6')">6</button>
      <button class="calc-btn operator" onclick="calcInput('-')">−</button>
      <button class="calc-btn" onclick="calcInput('1')">1</button>
      <button class="calc-btn" onclick="calcInput('2')">2</button>
      <button class="calc-btn" onclick="calcInput('3')">3</button>
      <button class="calc-btn operator" onclick="calcInput('+')">+</button>
      <button class="calc-btn" onclick="calcInput('0')" style="grid-column:span 2">0</button>
      <button class="calc-btn" onclick="calcInput('.')">.</button>
      <button class="calc-btn equals" onclick="calcEquals()">=</button>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="example-btn" onclick="calcInput('sqrt(')">√</button>
      <button class="example-btn" onclick="calcInput('^')">xⁿ</button>
      <button class="example-btn" onclick="calcInput('(')">( </button>
      <button class="example-btn" onclick="calcInput(')')"> )</button>
      <button class="example-btn" onclick="calcInput('pi')">π</button>
      <button class="example-btn" onclick="calcInput('e')">e</button>
    </div>
  </div>

  <!-- GRAPH TAB -->
  <div id="tab-graph" style="display:none">
    <div class="graph-input-row">
      <input class="graph-input" id="graph-input" placeholder="e.g. x^2  or  sin(x)  or  2*x+3"/>
      <button class="graph-btn" onclick="plotGraph()">📊 Plot</button>
    </div>
    <div class="graph-examples">
      <button class="example-btn" onclick="graphExample('x^2')">x²</button>
      <button class="example-btn" onclick="graphExample('x^3')">x³</button>
      <button class="example-btn" onclick="graphExample('sin(x)')">sin(x)</button>
      <button class="example-btn" onclick="graphExample('cos(x)')">cos(x)</button>
      <button class="example-btn" onclick="graphExample('tan(x)')">tan(x)</button>
      <button class="example-btn" onclick="graphExample('2*x+3')">2x+3</button>
      <button class="example-btn" onclick="graphExample('sqrt(x)')">√x</button>
      <button class="example-btn" onclick="graphExample('1/x')">1/x</button>
      <button class="example-btn" onclick="graphExample('x^2-4')">x²-4</button>
      <button class="example-btn" onclick="graphExample('abs(x)')">|x|</button>
    </div>
    <div class="range-row">
      <span class="range-label">x from:</span>
      <input class="range-input" id="x-min" value="-10"/>
      <span class="range-label">to:</span>
      <input class="range-input" id="x-max" value="10"/>
    </div>
    <div class="graph-container">
      <canvas id="graph-canvas" width="560" height="340"></canvas>
    </div>
    <div class="graph-info" id="graph-info">Enter a function and press Plot 📊</div>
  </div>

  <!-- HISTORY TAB -->
  <div id="tab-history" style="display:none">
    <div class="history-header">
      <span class="history-title">📜 History</span>
      <button class="clear-btn" onclick="clearHistory()">Clear All</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<script>
// ===== STATE =====
let historyData=JSON.parse(localStorage.getItem('mathHistory'))||[];
let calcExpr='';
let currentLang='en';
const const GEMINI_MODEL='gemini-2.0-flash-exp';

// ===== API KEY =====
const apiKeyInput=document.getElementById('api-key-input');
const savedKey=localStorage.getItem('geminiApiKey');
if(savedKey) apiKeyInput.value=savedKey;
apiKeyInput.addEventListener('change',function(){
  localStorage.setItem('geminiApiKey',apiKeyInput.value.trim());
});

function getApiKey(){
  const key=apiKeyInput.value.trim();
  if(key) localStorage.setItem('geminiApiKey',key);
  return key;
}

// ===== LANGUAGE =====
function setLang(lang,btn){
  currentLang=lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// ===== THEME =====
function toggleTheme(){
  document.body.classList.toggle('light');
  const isLight=document.body.classList.contains('light');
  document.getElementById('theme-btn').textContent=isLight?'🌙 Dark':'☀️ Light';
  localStorage.setItem('mathTheme',isLight?'light':'dark');
  if(document.getElementById('tab-graph').style.display!=='none') plotGraph();
}
if(localStorage.getItem('mathTheme')==='light'){
  document.body.classList.add('light');
  document.getElementById('theme-btn').textContent='🌙 Dark';
}

// ===== TABS =====
function switchTab(tab,btn){
  ['solver','calculator','graph','history'].forEach(t=>{
    document.getElementById('tab-'+t).style.display='none';
  });
  document.getElementById('tab-'+tab).style.display='block';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  if(tab==='history') renderHistory();
  if(tab==='graph') plotGraph();
}

// ===== EXAMPLES =====
function setExample(val){document.getElementById('problem-input').value=val;}
function graphExample(val){document.getElementById('graph-input').value=val;plotGraph();}

// ===== AI SOLVER =====
async function solveProblem(){
  const input=document.getElementById('problem-input').value.trim();
  const apiKey=getApiKey();
  const loading=document.getElementById('loading');
  const resultBox=document.getElementById('result-box');
  const errorBox=document.getElementById('error-box');
  const solveBtn=document.getElementById('solve-btn');

  if(!input){showError('প্রথমে একটা math problem লেখো!');return;}
  if(!apiKey){showError('প্রথমে উপরে Gemini API Key দাও!\n\naistudio.google.com থেকে key নাও।');return;}

  loading.classList.add('show');
  resultBox.classList.remove('show');
  errorBox.classList.remove('show');
  solveBtn.disabled=true;

  try{
    // First solve with mathjs if possible
    let quickAnswer='';
    try{
      if(!input.includes('?')&&!/[a-zA-Z]{2,}/.test(input)){
        const r=math.evaluate(input);
        quickAnswer=String(r);
      }
    }catch(e){}

    // Build AI prompt
    const langInstruction=currentLang==='bn'
      ? 'সম্পূর্ণ বাংলায় উত্তর দাও।'
      : 'Answer in English.';

    const prompt=`You are a friendly math teacher. Solve this math problem step by step in simple language that a student can understand.

Problem: ${input}
${quickAnswer?`Quick calculation result: ${quickAnswer}`:''}

${langInstruction}

Please provide:
1. The final answer clearly
2. Step-by-step solution (number each step)
3. Simple explanation of the concept
4. A helpful tip or real-life example

Format your response as:
ANSWER: [the answer]
---
STEPS:
[your step by step explanation]`;

    const response=await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`,
      {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          contents:[{parts:[{text:prompt}]}],
          generationConfig:{temperature:0.3,maxOutputTokens:1024}
        })
      }
    );

    if(!response.ok){
      const err=await response.json();
      throw new Error(err.error?.message||'API error: '+response.status);
    }

    const data=await response.json();
    const aiText=data.candidates?.[0]?.content?.parts?.[0]?.text||'No response';

    // Parse answer
    let answer=quickAnswer||'See explanation';
    let explanation=aiText;

    if(aiText.includes('ANSWER:')){
      const parts=aiText.split('---');
      const answerLine=parts[0].replace('ANSWER:','').trim();
      answer=answerLine;
      explanation=parts[1]?parts[1].replace('STEPS:','').trim():aiText;
    }

    // Show result
    document.getElementById('answer-display').textContent=answer;
    document.getElementById('ai-explanation').textContent=explanation;
    resultBox.classList.add('show');

    // Save to history
    saveHistory(input,answer);

  }catch(e){
    let msg=e.message;
    if(msg.includes('API_KEY_INVALID')||msg.includes('400')){
      msg='API Key ভুল! aistudio.google.com থেকে সঠিক key নাও।';
    } else if(msg.includes('429')){
      msg='অনেক বেশি request! একটু পরে আবার চেষ্টা করো।';
    } else if(msg.includes('fetch')){
      msg='Internet connection check করো!';
    }
    showError(msg);
  }finally{
    loading.classList.remove('show');
    solveBtn.disabled=false;
  }
}

function showError(msg){
  const e=document.getElementById('error-box');
  e.textContent='❌ '+msg;
  e.classList.add('show');
}

// ===== HISTORY =====
function saveHistory(problem,answer){
  historyData.unshift({problem,answer:String(answer),time:new Date().toLocaleTimeString(),lang:currentLang});
  if(historyData.length>30) historyData.pop();
  localStorage.setItem('mathHistory',JSON.stringify(historyData));
}
function renderHistory(){
  const list=document.getElementById('history-list');
  if(historyData.length===0){list.innerHTML='<div class="empty-history">কোনো history নেই! AI দিয়ে solve করো।</div>';return;}
  list.innerHTML=historyData.map((h,i)=>`
    <div class="history-item" onclick="loadHistory(${i})">
      <div class="history-problem">${h.problem.substring(0,50)}${h.problem.length>50?'...':''}</div>
      <div class="history-answer">= ${String(h.answer).substring(0,40)}</div>
    </div>`).join('');
}
function loadHistory(i){
  document.getElementById('problem-input').value=historyData[i].problem;
  switchTab('solver',document.querySelectorAll('.tab')[0]);
}
function clearHistory(){
  if(confirm('সব history মুছে দেবে?')){historyData=[];localStorage.removeItem('mathHistory');renderHistory();}
}

// ===== CALCULATOR =====
function calcInput(val){calcExpr+=val;document.getElementById('calc-display').value=calcExpr;}
function calcClear(){calcExpr='';document.getElementById('calc-display').value='';}
function calcDel(){calcExpr=calcExpr.slice(0,-1);document.getElementById('calc-display').value=calcExpr;}
function calcEquals(){
  try{
    const result=math.evaluate(calcExpr);
    document.getElementById('calc-display').value=result;
    saveHistory(calcExpr,result);
    calcExpr=String(result);
  }catch(e){document.getElementById('calc-display').value='Error';calcExpr='';}
}

// ===== GRAPH =====
function plotGraph(){
  const expr=document.getElementById('graph-input').value.trim();
  const canvas=document.getElementById('graph-canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width=canvas.offsetWidth||560;
  const H=canvas.height=340;
  const isLight=document.body.classList.contains('light');
  ctx.fillStyle=isLight?'#f8f9ff':'#0d1b2a';
  ctx.fillRect(0,0,W,H);
  if(!expr){
    ctx.fillStyle=isLight?'#aaa':'rgba(255,255,255,0.3)';
    ctx.font='14px Poppins,sans-serif';
    ctx.textAlign='center';
    ctx.fillText('Enter a function above to see its graph',W/2,H/2);
    return;
  }
  const xMin=parseFloat(document.getElementById('x-min').value)||(-10);
  const xMax=parseFloat(document.getElementById('x-max').value)||10;
  const xRange=xMax-xMin;
  const points=[];
  for(let i=0;i<=300;i++){
    const x=xMin+(xRange*i/300);
    try{const y=math.evaluate(expr,{x});points.push(typeof y==='number'&&isFinite(y)?{x,y}:null);}
    catch(e){points.push(null);}
  }
  const validY=points.filter(p=>p!==null).map(p=>p.y);
  if(validY.length===0){document.getElementById('graph-info').textContent='❌ Could not plot';return;}
  let yMin=Math.min(...validY),yMax=Math.max(...validY);
  if(yMin===yMax){yMin-=1;yMax+=1;}
  const yPad=(yMax-yMin)*0.1;yMin-=yPad;yMax+=yPad;
  const yRange=yMax-yMin;
  function cx(x){return((x-xMin)/xRange)*W;}
  function cy(y){return H-((y-yMin)/yRange)*H;}
  ctx.strokeStyle=isLight?'rgba(0,0,0,0.08)':'rgba(255,255,255,0.06)';
  ctx.lineWidth=1;
  for(let gx=Math.ceil(xMin);gx<=xMax;gx++){ctx.beginPath();ctx.moveTo(cx(gx),0);ctx.lineTo(cx(gx),H);ctx.stroke();}
  for(let gy=Math.ceil(yMin);gy<=yMax;gy++){ctx.beginPath();ctx.moveTo(0,cy(gy));ctx.lineTo(W,cy(gy));ctx.stroke();}
  ctx.strokeStyle=isLight?'rgba(0,0,0,0.25)':'rgba(255,255,255,0.25)';
  ctx.lineWidth=1.5;
  if(yMin<=0&&yMax>=0){ctx.beginPath();ctx.moveTo(0,cy(0));ctx.lineTo(W,cy(0));ctx.stroke();}
  if(xMin<=0&&xMax>=0){ctx.beginPath();ctx.moveTo(cx(0),0);ctx.lineTo(cx(0),H);ctx.stroke();}
  ctx.fillStyle=isLight?'rgba(0,0,0,0.4)':'rgba(255,255,255,0.35)';
  ctx.font='10px Poppins,sans-serif';
  ctx.textAlign='center';
  for(let gx=Math.ceil(xMin);gx<=xMax;gx+=Math.max(1,Math.ceil(xRange/10))){
    if(gx===0)continue;
    ctx.fillText(gx,cx(gx),(yMin<=0&&yMax>=0)?cy(0)+12:H-5);
  }
  ctx.textAlign='right';
  for(let gy=Math.ceil(yMin);gy<=yMax;gy+=Math.max(1,Math.ceil(yRange/8))){
    if(gy===0)continue;
    ctx.fillText(gy,(xMin<=0&&xMax>=0)?cx(0)-4:30,cy(gy)+4);
  }
  ctx.strokeStyle=isLight?'#667eea':'#e94560';
  ctx.lineWidth=2.5;
  ctx.lineJoin='round';
  ctx.beginPath();
  let started=false;
  points.forEach(p=>{
    if(!p){started=false;return;}
    if(!started){ctx.moveTo(cx(p.x),cy(p.y));started=true;}
    else ctx.lineTo(cx(p.x),cy(p.y));
  });
  ctx.stroke();
  ctx.fillStyle=isLight?'#667eea':'#4ecca3';
  ctx.font='bold 13px Poppins,sans-serif';
  ctx.textAlign='left';
  ctx.fillText('y = '+expr,10,20);
  document.getElementById('graph-info').textContent=`y = ${expr} | x: [${xMin}, ${xMax}]`;
}

window.addEventListener('resize',()=>{
  if(document.getElementById('tab-graph').style.display!=='none') plotGraph();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&e.ctrlKey) solveProblem();
});
</script>
